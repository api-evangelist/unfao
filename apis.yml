apis:
  - name: FAOSTAT Data API
    description: >
      REST API providing programmatic access to FAOSTAT's 70+ agricultural and food
      statistics domains. Supports filtering by area, item, element, and year.
      Returns JSON and CSV. No authentication required for public data access.
    image: https://www.fao.org/favicon.ico
    humanURL: https://www.fao.org/faostat/en/#developer-portal
    baseURL: https://fenixservices.fao.org/faostat/api/v1
