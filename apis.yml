name: FAO FAOSTAT
description: >
  The Food and Agriculture Organization (FAO) of the United Nations operates FAOSTAT,
  the world's largest freely accessible database for food and agriculture statistics.
  FAOSTAT provides REST APIs for programmatic access to agricultural production data,
  food security indicators, trade flows, land use, environmental indicators, food
  balances, and prices covering 180+ countries from 1961 to present across 70+
  thematic domains.
image: https://www.fao.org/favicon.ico
tags:
